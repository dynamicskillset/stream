name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'
  # Allow manual trigger for on-demand builds
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms and build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Build release APK
        run: gradle assembleRelease

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-debug
          path: packages/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload release APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: stream-release
          path: packages/android/app/build/outputs/apk/release/app-release-unsigned.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' packages/android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_TAG="android-v$VERSION"
          # Fetch tags to check for duplicates
          git fetch --tags
          if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=${BASE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "name=Stream Android v${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
            echo "name=Stream Android v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Stream for Android

            Install the APK on your Android device (Settings > Install unknown apps).

            | File | Description |
            |------|-------------|
            | `app-debug.apk` | Debug build with logging enabled |
            | `app-release-unsigned.apk` | Optimized & minified (unsigned) |

            > To sign the release APK for Play Store distribution, use `apksigner` with your keystore.
          files: |
            artifacts/stream-debug/app-debug.apk
            artifacts/stream-release/app-release-unsigned.apk
          draft: false
          prerelease: false
