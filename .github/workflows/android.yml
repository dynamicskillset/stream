name: Android Build

on:
  push:
    branches: [main]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'packages/android/**'
      - '.github/workflows/android.yml'
  # Allow manual trigger for on-demand builds
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/android

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK platforms and build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Decode signing keystore
        if: github.event_name != 'pull_request'
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/stream-release.jks
        working-directory: .

      - name: Build release APK
        env:
          KEYSTORE_FILE: ${{ github.event_name != 'pull_request' && '/tmp/stream-release.jks' || '' }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: stream-release
          path: packages/android/app/build/outputs/apk/release/app-release.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Get version from build.gradle.kts
        id: version
        run: |
          VERSION=$(grep 'versionName' packages/android/app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download APK artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Determine release tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE_TAG="android-v$VERSION"
          git fetch --tags
          if git rev-parse "$BASE_TAG" >/dev/null 2>&1; then
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "tag=${BASE_TAG}-${SHORT_SHA}" >> "$GITHUB_OUTPUT"
            echo "name=Stream Android v${VERSION} (${SHORT_SHA})" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$BASE_TAG" >> "$GITHUB_OUTPUT"
            echo "name=Stream Android v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: ${{ steps.tag.outputs.name }}
          body: |
            ## Stream for Android

            Download and install the APK on your Android device (Settings > Install unknown apps).
          files: |
            artifacts/stream-release/app-release.apk
          draft: false
          prerelease: false
